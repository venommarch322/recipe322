<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Harvest & Spoon</title>
  <meta name="description" content="Contact Harvest & Spoon for recipe questions, partnerships, or feedback." />
  <link rel="canonical" href="https://example.com/contact.html" />
  <style>
    body{font-family:Arial,Helvetica,sans-serif;max-width:900px;margin:auto;padding:20px;line-height:1.7;color:#1f2937}
    input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #d1d5db;border-radius:8px}
    button{background:#2f855a;color:#fff;border:none;padding:12px 18px;border-radius:8px;font-weight:700}
    a{color:#2f855a}
  </style>
</head>
<body>
  <h1>Contact Us</h1>
  <p>Email: support@harvestandspoon.com</p>
  <p>For questions, suggestions, or partnerships, send us a message below.</p>
  <form action="#" method="post">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
    <button type="submit">Send</button>
  </form>
  <p><a href="/">Back to Home</a></p>
</body>
</html>
